name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: linux-amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - name: windows-amd64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
          - name: macos-amd64
            target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - name: macos-arm64
            target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a sitescrape-${{ matrix.target }}.zip ./target/${{ matrix.target }}/release/sitescrape.exe
          else
            tar -czf sitescrape-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release sitescrape
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: sitescrape-${{ matrix.target }}.*
          generate_release_notes: true
